[package]
name = "cocli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
authors.workspace = true
description = "cocli — local-first multi-agent platform (OSS)"
default-run = "cocli"

[[bin]]
name = "cocli"
path = "src/main.rs"

[dependencies]
tokio = { workspace = true }
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow = { workspace = true }
dirs = { workspace = true }
chrono = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
sha2 = { workspace = true }
cocli-api = { path = "../../crates/cocli-api" }
cocli-reaper = { path = "../../crates/cocli-reaper" }
cocli-server = { path = "../../crates/cocli-server" }
cocli-store = { path = "../../crates/cocli-store" }

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "=0.61.2", features = ["Win32_Storage_FileSystem"] }

[dev-dependencies]
tempfile = { workspace = true }
