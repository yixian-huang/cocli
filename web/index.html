<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#c96442" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cocli" />
    <meta name="description" content="Multi-agent Claude on your machine." />
    <title>cocli local</title>
    <script>
      (function () {
        try {
          var id = localStorage.getItem('cocli-theme') || 'sandstone-light';
          var mode = id.indexOf('-dark') >= 0 ? 'dark' : 'light';
          var root = document.documentElement;
          root.setAttribute('data-theme', id);
          root.setAttribute('data-mode', mode);
          if (mode === 'dark') root.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
