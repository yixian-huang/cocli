name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Primary green matrix for early alpha. Extra targets (intel mac, aarch64-linux
  # cross) return after installer / OpenSSL packaging work lands.
  rust:
    name: Rust ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.80"
          targets: ${{ matrix.target }}
          components: rustfmt, clippy

      # cocli-server embeds web assets (embed-web); Windows runners need npm on PATH.
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web deps for embed-web
        run: |
          cd web
          npm ci
          npm run build

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (workspace)
        run: cargo build --workspace --all-targets --target ${{ matrix.target }}

      - name: Test
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: fmt check
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo fmt --all -- --check

      - name: clippy
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Runtime release manifest gate
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: scripts/check-runtime-release.sh

  web:
    name: Web (Node 20)
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci
      - run: cd web && npx tsc --noEmit
      - run: cd web && npm run lint
      - run: cd web && npm run build
      - run: cd web && npm test
